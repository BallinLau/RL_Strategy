# 日度版本（仅多头）

data:
  data_path: "/Users/ballinliu/Desktop/PaperWork/林同学/寒假计划/trading_rl_system/data/filtered"
  symbols_file: "/Users/ballinliu/Desktop/PaperWork/徐同学/寒假计划/Stkcd.csv"
  bar_frequency: "daily"
  symbols: []
  train_start_date: "2022-01-01"
  train_end_date: "2025-12-31"
  train_ratio: 0.7
  val_ratio: 0.15

training:
  num_episodes: 140
  max_steps_per_episode: null
  random_start: true
  save_freq: 10
  eval_freq: 10
  log_freq: 1
  output_dir: "outputs/training_daily_long_only"
  incremental_save_freq: 5000

environment:
  initial_capital: 1000000
  period_minutes: 1440
  state_lookback_days: 5
  switch_period_multiplier: 1
  transaction_cost: 0.0008
  dynamic_switch: false
  state_update_frequency: "high"
  allow_short: false
  max_short_per_symbol_ratio: 0.05
  max_total_short_ratio: 0.15
  max_position_ratio: 0.20
  total_position_ratio: 0.90
  rebalance_tolerance: 0.01
  max_trade_fraction: 0.15
  slippage_rate: 0.00015
  impact_rate: 0.00005
  min_commission: 2.0
  min_signal_threshold: 0.0
  signal_power: 1.0

agent:
  learning_rate: 0.0001
  gamma: 0.995
  epsilon_start: 0.20
  epsilon_end: 0.02
  epsilon_decay: 0.995
  target_update_freq: 5
  batch_size: 32
  buffer_capacity: 30000
  device: "cpu"
  train_freq: 1
  clear_replay_buffer_on_resume: true
  reset_epsilon_on_resume: true
  exploration_mode: "prior_guided"
  action0_bias: 0.20
  signal_blend_weight: 0.12
  random_action_temperature: 0.8
  loss_type: "huber"
  gradient_clip_norm: 0.5

reward:
  alpha: 1.0
  kappa: 0.10
  beta: 0.03
  gamma: 0.03
  delta: -0.0002
  eta: 0.0
  theta: 0.0
  zeta: 0.0
  history_window: 120
  performance_weight: 0.2
  cutoff_threshold: 0.8
  base_weight: 0.8
  drawdown_threshold: 0.12
  volatility_lookback: 20
  commission_rate: 0.0003
  slippage_rate: 0.00015
  market_impact_factor: 0.00005
  min_commission: 2.0
  tax_rate: 0.0005
  negative_return_penalty: 0.08
  terminal_return_bonus: 1.0

position:
  max_position_ratio: 0.20
  total_position_ratio: 0.90

backtest:
  initial_capital: 1000000
  transaction_cost: 0.0008

model:
  model_path: "models/daily_long_only"

evaluation:
  num_episodes: 1
  output_dir: "outputs/evaluation_daily_long_only"

device:
  use_cuda: false
  cuda_device: 0

seed: 42
