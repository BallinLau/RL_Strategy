# 模型配置文件 (Model Configuration)

# Q网络配置
q_network:
  hidden_dims: [256, 128, 64]  # 隐藏层维度
  dropout: 0.2                  # Dropout比例
  activation: 'relu'            # 激活函数

# DDQN参数
ddqn:
  learning_rate: 0.0001         # 学习率
  gamma: 0.99                   # 折扣因子
  epsilon_start: 1.0            # 初始探索率
  epsilon_end: 0.01             # 最小探索率
  epsilon_decay: 0.995          # 探索率衰减
  target_update_freq: 10        # 目标网络更新频率（episode）
  batch_size: 64                # 批次大小
  buffer_capacity: 100000       # 经验回放缓冲区容量

# 优化器配置
optimizer:
  type: 'adam'                  # 优化器类型
  weight_decay: 0.0001          # 权重衰减
  grad_clip: 10.0               # 梯度裁剪
