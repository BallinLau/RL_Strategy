# CRSP 日度重启版本（优先修复动作错配 + 按年份切分）

data:
  data_path: "/Users/ballinliu/Desktop/PaperWork/林同学/寒假计划/trading_rl_system/data/crsp_ohlc_all"
  symbols_file: "/Users/ballinliu/Desktop/PaperWork/林同学/寒假计划/trading_rl_system/data/crsp_top100_symbols_2024.csv"
  bar_frequency: "daily"
  symbols: []
  train_start_date: "1990-01-01"
  train_end_date: "2025-12-31"
  split_mode: "calendar_year"
  test_year: 2025
  fallback_to_latest_available_test_year: true
  train_ratio: 0.7
  val_ratio: 0.15

training:
  num_episodes: 80
  max_steps_per_episode: 2000
  random_start: true
  save_freq: 10
  eval_freq: 10
  log_freq: 1
  output_dir: "outputs/training_crsp_daily_2025_test_restart_v1"
  incremental_save_freq: 5000
  use_best_checkpoint_for_eval: true

environment:
  initial_capital: 1000000
  period_minutes: 1440
  state_lookback_days: 5
  switch_period_multiplier: 1
  transaction_cost: 0.0008
  dynamic_switch: false
  state_update_frequency: "high"
  allow_short: false
  max_short_per_symbol_ratio: 0.05
  max_total_short_ratio: 0.15
  max_position_ratio: 0.16
  total_position_ratio: 0.90
  rebalance_tolerance: 0.004
  max_trade_fraction: 0.10
  slippage_rate: 0.00015
  impact_rate: 0.00005
  min_commission: 2.0
  min_signal_threshold: 0.01
  signal_power: 1.15
  profit_lock_enabled: true
  profit_lock_min_return: 0.03
  profit_lock_drawdown_threshold: 0.07
  profit_lock_cooldown_steps: 8
  profit_lock_safe_action: 0

agent:
  learning_rate: 0.00008
  gamma: 0.995
  epsilon_start: 0.12
  epsilon_end: 0.01
  epsilon_decay: 0.992
  target_update_freq: 5
  batch_size: 64
  buffer_capacity: 50000
  device: "cpu"
  train_freq: 1
  clear_replay_buffer_on_resume: true
  reset_epsilon_on_resume: true
  exploration_mode: "prior_guided"
  action0_bias: 0.06
  signal_blend_weight: 0.05
  random_action_temperature: 1.0
  loss_type: "huber"
  gradient_clip_norm: 0.5

reward:
  alpha: 1.0
  kappa: 0.10
  beta: 0.02
  gamma: 0.02
  delta: -0.0002
  eta: 0.0
  theta: 0.0
  zeta: 0.0
  history_window: 120
  performance_weight: 0.2
  cutoff_threshold: 0.8
  base_weight: 0.8
  drawdown_threshold: 0.12
  volatility_lookback: 20
  commission_rate: 0.0003
  slippage_rate: 0.00015
  market_impact_factor: 0.00005
  min_commission: 2.0
  tax_rate: 0.0005
  negative_return_penalty: 0.05
  terminal_return_bonus: 1.3
  preserve_history_across_episodes: false

position:
  max_position_ratio: 0.16
  total_position_ratio: 0.85

backtest:
  initial_capital: 1000000
  transaction_cost: 0.0008

model:
  model_path: "models/crsp_daily_2025_test_restart_v1"

evaluation:
  num_episodes: 1
  output_dir: "outputs/evaluation_crsp_daily_2025_test_restart_v1"

device:
  use_cuda: false
  cuda_device: 0

seed: 42
